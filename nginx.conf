server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — todas as rotas caem no index.html (React Router).
  # index.html NUNCA em cache: ele aponta pro bundle com hash. Se o navegador
  # segurar um index.html velho, o usuário fica preso num bundle antigo — e um
  # deploy que muda API/segurança quebra pra quem tem cache. Sempre revalidar.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, must-revalidate";
  }

  # cache de assets com hash
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
